<style>

body{
    background:#111;
    font-family:'Segoe UI', sans-serif;
    margin:0;
    padding:0;
    color:white;
}

/* NAVBAR */
.navbar{
    background: linear-gradient(90deg,#e10600,#000000) !important;
}

.navbar-brand{
    font-weight:bold;
    color:#ffcc00 !important;
}

.nav-link{
    color:white !important;
    margin:0 12px;
}

.nav-link:hover{
    color:#ffcc00 !important;
}

.nav-link.active{
    color:#ffcc00 !important;
    font-weight:bold;
}

/* SECCIÓN */
.contact-section{
    padding:130px 10%;
}

/* TARJETA CONTACTO */
.contact-card{
    background:#1c1c1c;
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,0,0,0.4);
    margin-bottom:40px;
    text-align:center;
}

.contact-card h3{
    color:#ffcc00;
    margin-bottom:20px;
}

.phone{
    font-size:1.2rem;
    margin:10px 0;
}

/* BOTONES */
.btn-custom{
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn-whatsapp{
    background:#25D366;
    color:white;
}

.btn-whatsapp:hover{
    background:#1ebe5d;
}

.btn-email{
    background:#ff2e2e;
    color:white;
}

.btn-email:hover{
    background:#e10600;
}

/* FORMULARIO */
.form-control{
    background:#2a2a2a;
    border:none;
    color:white;
    margin-bottom:15px;
}

.form-control:focus{
    background:#333;
    color:white;
    box-shadow:none;
    border:1px solid #ff2e2e;
}

.btn-send{
    background:#ff2e2e;
    border:none;
    padding:12px;
    width:100%;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

.btn-send:hover{
    background:#e10600;
}

/* FOOTER */
footer{
    background:#000;
    text-align:center;
    padding:25px;
    color:#ffcc00;
    margin-top:60px;
}

</style>
</head>

<body>
